## RatGTEx version, e.g. "v4"
version: "v4"

## Path to reference genome fasta file ending in .fa
## I downloaded the FASTA and GTF from Ensembl release 116 and ran `gunzip` on them
ref_anno: "ref/Rattus_norvegicus.GRCr8.116.gtf"
ref_geno: "ref/Rattus_norvegicus.GRCr8.dna.toplevel.fa"

## RatGTEx sample table mapping rat IDs to SRA accessions. Download it, then run
## scripts/setup/setup_sra.py to generate each tissue's rat_ids.txt and
## fastq_map.txt so the FASTQs are fetched from the SRA by the pipeline:
##   wget https://ratgtex.org/data/v4/ref/RatGTEx_samples.v4.tsv
##   python3 scripts/setup/setup_sra.py --samples RatGTEx_samples.v4.tsv \
##       --version v4 --tissue Liver
samples_table: "RatGTEx_samples.v4.tsv"

## Download URL for the unphased genotype VCF of each genotype dataset. These are
## fetched to geno/original/, REF-corrected against the reference genome, and
## phased with Beagle by the pipeline.
geno_url:
  ratgtex_v4_round11_2: "https://ratgtex.org/data/v4/geno/ratgtex_v4_round11_2.rn8.vcf.gz"

## Optional genetic map (PLINK format) per genotype dataset for Beagle phasing.
## Without one, Beagle assumes a uniform 1 cM/Mb rate.
# geno_map:
#   ratgtex_v4_round11_2: "ref/genetic_map.rn8.txt"

## All uncommented tissues in this list will be processed.
## For now only the Liver dataset is run; the other datasets remain configured
## below and can be re-enabled by uncommenting them here.
## For same-tissue datasets, run scripts/setup/setup_merged_tissues.sh before or
## after running individual datasets to set up the merged directories. After
## running the constituent datasets fully, comment them out here and uncomment
## the merged tissue.
run:
  - Liver
  ## Singletons:
  # - Adipose
  # - BLA
  # - Brain
  # - Eye
  # - IC
  # - IL
  # - LHb
  # - OFC
  # - RMTg
  ## Tissues to merge:
  # - NAcc1
  # - NAcc2
  # - NAcc3
  # - NAcc4
  # - PL1
  # - PL2
  # - PL3
  # - pVTA1
  # - pVTA2
  ## Merged tissues:
  # - NAcc
  # - PL
  # - pVTA

merged_tissues:
  NAcc:
    - NAcc1
    - NAcc2
    - NAcc3
    - NAcc4
  PL:
    - PL1
    - PL2
    - PL3
  pVTA:
    - pVTA1
    - pVTA2

tissues:
  ## IL, LHb, NAcc1, OFC, and PL1 datsets
  IL:
    read_length: 100
    fastq_path: "fastq/IL_LHb_NAcc_OFC_PL"
    paired_end: false
    geno_dataset: "ratgtex_v4_round11_2"
  LHb:
    read_length: 100
    fastq_path: "fastq/IL_LHb_NAcc_OFC_PL"
    paired_end: false
    geno_dataset: "ratgtex_v4_round11_2"
  NAcc1:
    read_length: 100
    fastq_path: "fastq/IL_LHb_NAcc_OFC_PL"
    paired_end: false
    geno_dataset: "ratgtex_v4_round11_2"
  OFC:
    read_length: 100
    fastq_path: "fastq/IL_LHb_NAcc_OFC_PL"
    paired_end: false
    geno_dataset: "ratgtex_v4_round11_2"
  PL1:
    read_length: 100
    fastq_path: "fastq/IL_LHb_NAcc_OFC_PL"
    paired_end: false
    geno_dataset: "ratgtex_v4_round11_2"

  ## Eye dataset
  Eye:
    read_length: 150
    fastq_path: "fastq/Eye"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"

  ## BLA, NAcc2, and PL2 samples from u01_suzanne_mitchell
  ## Note: half of NAcc2 samples are single-end. The FASTQ map file will contain
  ## both single-end and paired-end files (i.e. some rows have two columns, and
  ## some have three). paired_end is unspecified so that both types can be used.
  BLA:
    read_length: 100
    fastq_path: "fastq/BLA_NAcc2_PL2"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"
  NAcc2:
    read_length: 100
    fastq_path: "fastq/BLA_NAcc2_PL2"
    geno_dataset: "ratgtex_v4_round11_2"
  PL2:
    read_length: 100
    fastq_path: "fastq/BLA_NAcc2_PL2"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"

  ## Adipose and Liver dataset
  Adipose:
    read_length: 76
    fastq_path: "fastq/Adipose_Liver/Fat"
    paired_end: false
    geno_dataset: "ratgtex_v4_round11_2"
  ## Liver FASTQs are downloaded from the SRA into fastq/Liver by the pipeline
  ## (see setup_sra.py). All Liver samples are paired-end.
  Liver:
    read_length: 126
    fastq_path: "fastq/Liver"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"

  ## Whole brain hemisphere dataset
  Brain:
    read_length: 101
    fastq_path: "fastq/Brain"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"

  ## RMTg dataset
  RMTg:
    read_length: 151
    fastq_path: "fastq/RMTg"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"

  ## NAcc3, PL3, and pVTA1 samples from p50_hao_chen_2020_rnaseq
  NAcc3:
    read_length: 151
    fastq_path: "fastq/NAcc3_PL3_pVTA"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"
  PL3:
    read_length: 151
    fastq_path: "fastq/NAcc3_PL3_pVTA"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"
  pVTA1:
    read_length: 151
    fastq_path: "fastq/NAcc3_PL3_pVTA"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"

  ## IC, NAcc4, and pVTA2 samples from p50_paul_meyer_2020_rnaseq
  IC:
    read_length: 151
    fastq_path: "fastq/IC_NAcc4_pVTA2"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"
  NAcc4:
    read_length: 151
    fastq_path: "fastq/IC_NAcc4_pVTA2"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"
  pVTA2:
    read_length: 151
    fastq_path: "fastq/IC_NAcc4_pVTA2"
    paired_end: true
    geno_dataset: "ratgtex_v4_round11_2"
