## Host conda environment for *launching* the RatGTEx pipeline.
## Create with:  conda env create -n ratgtex --file environment.yml
##
## This env only needs to run Snakemake itself (pure Python). All bioinformatics
## tools run inside Apptainer/Singularity containers (see containers/*.def and
## the `container:` directives on the rules), so they are NOT installed here —
## this is deliberate, to avoid conda pulling binaries that don't run on the
## cluster's old glibc. Apptainer itself is expected from the system / a module.
name: ratgtex
channels:
  - conda-forge
  - bioconda
dependencies:
  - python >=3.10
  - snakemake-minimal >=8
  # Cluster executor plugin (this repo's run_pipeline.sh uses `--executor lsf`;
  # swap for snakemake-executor-plugin-slurm on a Slurm cluster).
  - snakemake-executor-plugin-lsf
